name: Build mkpsxiso
on:   push 

jobs:
  build-alpine:
    name:    Build mkpsxiso on alpine
    runs-on: ubuntu-latest
    container: 
      image: alpine:latest

    steps:
    - name: apk prep
      run: |
        apk update
        apk add cmake make git openssh clang

    - name: Fetch repo contents
      uses: actions/checkout@v7
      with:
        submodules: recursive

    - name: Build and package mkpsxiso
      run: |
        mkdir build
        cd build
        cmake ..
        make

    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: mkpsxiso-alpine
        path: build/mkpsxiso

  # This job takes care of creating a new release and upload the build
  # artifacts if the last commit is associated to a tag.
  create-release:
    name:    Create release
    runs-on: ubuntu-latest
    needs:   build-alpine

    steps:
    - name: Fetch build artifacts
      if:   ${{ github.ref_type == 'tag' }}
      uses: actions/download-artifact@v8

    - name: Publish release
      if:   ${{ github.ref_type == 'tag' }}
      uses: softprops/action-gh-release@v3
      with:
        fail_on_unmatched_files: true
        #generate_release_notes:  true
        files: |
          mkpsxiso-alpine/*
